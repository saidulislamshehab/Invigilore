# ============================================
# Invigilore — Docker Compose Configuration
# ============================================
# Services: frontend (React), backend (Laravel), db (MSSQL), nginx

services:
  # ──────────────────────────────────────────
  # Frontend — React (Vite dev server)
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invigilore_frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:${NGINX_PORT:-8080}/api/v1
    depends_on:
      - backend
    networks:
      - invigilore_network
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Backend — Laravel (PHP-FPM)
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invigilore_backend
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    env_file:
      - .env.docker
    environment:
      - APP_NAME=Invigilore
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
    networks:
      - invigilore_network
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Nginx — Web Server (reverse proxy)
  # ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: invigilore_nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - invigilore_network
    restart: unless-stopped

# ──────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────
volumes:
  backend_vendor:
    driver: local

# ──────────────────────────────────────────
# Networks
# ──────────────────────────────────────────
networks:
  invigilore_network:
    driver: bridge
